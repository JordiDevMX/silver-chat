<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 250" role="img" aria-label="SilverChat">
  <defs>
    <linearGradient id="emblemGrad" x1="125" y1="40" x2="210" y2="210" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#38BDF8"/>
      <stop offset="0.5" stop-color="#1E90FF"/>
      <stop offset="1" stop-color="#0084FF"/>
    </linearGradient>
    <filter id="neonGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <g id="emblem" filter="url(#neonGlow)">
    <circle cx="125" cy="125" r="85" fill="url(#emblemGrad)"/>
  </g>

  <text x="125" y="118"
        font-family="'Manrope','Segoe UI','Inter',system-ui,sans-serif"
        font-size="120" font-weight="800"
        text-anchor="middle" dominant-baseline="central"
        fill="#FFFFFF">S</text>

  <text x="240" y="158"
        font-family="'Manrope','Segoe UI','Inter',system-ui,sans-serif"
        font-size="88" font-weight="800"
        letter-spacing="-1">
    <tspan fill="#FFFFFF">Silver</tspan><tspan fill="#0084FF">Chat</tspan>
  </text>
</svg>